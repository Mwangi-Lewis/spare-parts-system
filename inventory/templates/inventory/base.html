{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Spare Parts System{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9; color: #22272e; line-height: 1.5;
    }
    header {
      background: #1f3a5f; color: #fff; padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    nav a {
      color: #dce7f5; text-decoration: none; margin-left: 20px; font-size: 14px;
    }
    nav a:hover { color: #fff; text-decoration: underline; }
    .container { max-width: 1100px; margin: 28px auto; padding: 0 20px; }
    h2 { font-size: 22px; color: #1f3a5f; margin-bottom: 16px; }
    .card {
      background: #fff; border: 1px solid #d6dce4; border-radius: 6px;
      padding: 20px; margin-bottom: 20px;
    }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th {
      background: #2e5a88; color: #fff; text-align: left;
      padding: 10px 12px; font-size: 13px;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #e6eaef; font-size: 14px; }
    tr:nth-child(even) td { background: #fafbfc; }
    .badge {
      display: inline-block; padding: 3px 9px; border-radius: 11px;
      font-size: 11px; font-weight: 600;
    }
    .badge-low { background: #fde7e0; color: #a33; }
    .badge-ok { background: #e4f3ea; color: #1a6b3c; }
    .search-bar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    input[type="text"], select {
      padding: 8px 12px; border: 1px solid #c8d0da; border-radius: 4px;
      font-size: 14px; font-family: inherit;
    }
    input[type="text"] { flex: 1; min-width: 200px; }
    button, .btn {
      background: #2e5a88; color: #fff; border: none; padding: 8px 18px;
      border-radius: 4px; font-size: 14px; cursor: pointer;
      font-family: inherit; text-decoration: none; display: inline-block;
    }
    button:hover, .btn:hover { background: #24486d; }
    .muted { color: #5c6673; font-size: 13px; }
    .specs { font-size: 12px; color: #5c6673; }
  </style>
</head>
<body>
  <header>
    <h1>Computer Spare Parts Management System</h1>
    <nav>
      <a href="{% url 'product_list' %}">Catalogue</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
