{% extends "inventory/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <div class="card" style="max-width:400px; margin:60px auto;">
    <h2>Sign in</h2>

    {% if form.errors %}
      <p style="color:#a33; font-size:14px; margin-bottom:12px;">
        Incorrect username or password. Please try again.
      </p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom:14px;">
        <label style="display:block; font-size:13px; margin-bottom:4px;">Username</label>
        <input type="text" name="username" required autofocus
               style="width:100%;">
      </div>
      <div style="margin-bottom:18px;">
        <label style="display:block; font-size:13px; margin-bottom:4px;">Password</label>
        <input type="password" name="password" required
               style="width:100%; padding:8px 12px; border:1px solid #c8d0da;
                      border-radius:4px; font-size:14px; font-family:inherit;">
      </div>
      <button type="submit" style="width:100%;">Sign in</button>
    </form>
  </div>
{% endblock %}
